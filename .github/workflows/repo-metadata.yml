name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  metadata: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Configure repository About section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "repos/${{ github.repository }}" \
            -f description='Node.js starter for Feedico merchants and coupons REST API. Docs: feedico.io/docs' \
            -f homepage='https://feedico.io'

          echo '{"names":["feedico","coupon-api","affiliate-api","merchants","coupons","rest-api","nodejs","javascript","api-example","affiliate-marketing","publisher-api"]}' \
            | gh api --method PUT "repos/${{ github.repository }}/topics" --input -
