name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  metadata: write
  administration: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Configure description, homepage, and topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -x
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}" \
            -d '{"description":"Node.js starter for Feedico merchants and coupons REST API. Docs: feedico.io/docs","homepage":"https://feedico.io"}'

          curl -sS -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.mercy-preview+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/topics" \
            -d '{"names":["feedico","coupon-api","affiliate-api","merchants","coupons","rest-api","nodejs","javascript","api-example","affiliate-marketing","publisher-api"]}'
